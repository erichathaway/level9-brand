<?xml version="1.0" encoding="UTF-8"?>
<!--
  LucidORG static tile. 1200x630.
  Visual: oscilloscope waveform scanning across the tile with friction spikes + intervention markers.
  Canonical color: cyan (#06b6d4) into blue.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="LucidORG · Friction Detection">
  <defs>
    <linearGradient id="lucWord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="lucGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lucWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#060610"/>
  <ellipse cx="900" cy="315" rx="420" ry="260" fill="url(#lucGlow)"/>

  <!-- Oscilloscope gridlines -->
  <g stroke="rgba(6,182,212,0.08)" stroke-width="1">
    <line x1="700" y1="200" x2="1180" y2="200"/>
    <line x1="700" y1="260" x2="1180" y2="260"/>
    <line x1="700" y1="315" x2="1180" y2="315"/>
    <line x1="700" y1="370" x2="1180" y2="370"/>
    <line x1="700" y1="430" x2="1180" y2="430"/>
    <line x1="760"  y1="180" x2="760"  y2="450"/>
    <line x1="820"  y1="180" x2="820"  y2="450"/>
    <line x1="880"  y1="180" x2="880"  y2="450"/>
    <line x1="940"  y1="180" x2="940"  y2="450"/>
    <line x1="1000" y1="180" x2="1000" y2="450"/>
    <line x1="1060" y1="180" x2="1060" y2="450"/>
    <line x1="1120" y1="180" x2="1120" y2="450"/>
  </g>

  <!-- Waveform baseline -->
  <line x1="700" y1="315" x2="1180" y2="315" stroke="rgba(6,182,212,0.25)" stroke-width="1" stroke-dasharray="2 4"/>

  <!-- The waveform itself (friction signal with two intervention spikes) -->
  <path d="M 700,315 L 720,315 L 730,308 L 740,322 L 755,312 L 770,318 L 785,310 L 800,315
           L 820,230 L 830,315
           L 850,318 L 870,312 L 890,320 L 910,310 L 930,318 L 950,312
           L 975,410 L 985,315
           L 1005,318 L 1025,310 L 1045,320 L 1070,312 L 1100,316 L 1130,314 L 1180,315"
        fill="none" stroke="url(#lucWave)" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Intervention markers over the two spikes -->
  <g transform="translate(825 215)">
    <circle r="9" fill="#060610" stroke="#06b6d4" stroke-width="2"/>
    <circle r="3" fill="#06b6d4"/>
    <text x="14" y="-4" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#67e8f9" letter-spacing="1.5">LEVER 14</text>
    <text x="14" y="8" font-family="SF Mono, Menlo, monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">HANDOFF FRICTION</text>
  </g>
  <g transform="translate(975 400)">
    <circle r="9" fill="#060610" stroke="#06b6d4" stroke-width="2"/>
    <circle r="3" fill="#06b6d4"/>
    <text x="-14" y="-4" text-anchor="end" font-family="SF Mono, Menlo, monospace" font-size="9" fill="#67e8f9" letter-spacing="1.5">LEVER 29</text>
    <text x="-14" y="8" text-anchor="end" font-family="SF Mono, Menlo, monospace" font-size="9" fill="rgba(255,255,255,0.5)" letter-spacing="1.5">DECISION LAG</text>
  </g>

  <!-- Scope frame label -->
  <g transform="translate(710 470)">
    <text font-family="SF Mono, Menlo, monospace" font-size="9" fill="rgba(6,182,212,0.6)" letter-spacing="2.5">ECI · EXECUTION CAPABILITY INDEX · LIVE</text>
  </g>

  <!-- Level9 co-sign -->
  <g transform="translate(1050 560)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#0d0d18" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
    <text x="20" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="22" fill="#ffffff" transform="rotate(-14 20 26)" style="letter-spacing:-0.04em">9</text>
    <text x="52" y="25" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13" fill="rgba(255,255,255,0.65)">Level9 OS</text>
    <text x="52" y="40" font-family="SF Mono, Menlo, monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">MEASUREMENT LAYER</text>
  </g>

  <!-- Eyebrow + status chip -->
  <text x="72" y="96" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#67e8f9" letter-spacing="5.5">FRICTION DETECTION</text>
  <g transform="translate(72 108)">
    <rect x="0" y="0" width="62" height="22" rx="11" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
    <circle cx="12" cy="11" r="3" fill="#10b981"/>
    <text x="22" y="15" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#10b981" letter-spacing="1.6">LIVE</text>
    <text x="80" y="16" font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="3">4 PILLARS · 37 LEVERS</text>
  </g>

  <!-- Product name -->
  <text x="72" y="278" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="120" fill="url(#lucWord)" letter-spacing="-4">LucidORG</text>

  <text x="72" y="352" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.75)">You measure outputs but can't see where</text>
  <text x="72" y="384" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.75)">execution actually breaks.</text>

  <text x="72" y="440" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#67e8f9">Real-time friction detection. Four pillars, 37 levers.</text>
  <text x="72" y="468" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#67e8f9">Tells you exactly which lever to pull.</text>

  <g transform="translate(72 560)">
    <text font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="3">MEASUREMENT · THE NERVOUS SYSTEM</text>
    <text y="22" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="rgba(255,255,255,0.55)">lucidorg.com</text>
  </g>
</svg>
