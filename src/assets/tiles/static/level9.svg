<?xml version="1.0" encoding="UTF-8"?>
<!--
  Level9OS umbrella static tile. 1200x630 (LinkedIn Experience + post + OG share).
  Visual: 4-pressure-point alignment cycle around a chassis ring with the
  active verb (Coordinate.) frozen mid-pulse. Wordmark "Level9OS" full-bleed left.
  Canonical color band: violet -> cyan -> fuchsia.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Level9OS · AI for Operations">
  <defs>
    <linearGradient id="l9osWord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="50%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="l9osChassis" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="l9osHubGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="l9osBgGlow" cx="78%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.30"/>
      <stop offset="50%"  stop-color="#06b6d4" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060610"/>
  <ellipse cx="930" cy="220" rx="520" ry="380" fill="url(#l9osBgGlow)"/>

  <!-- Hero: alignment cycle -->
  <g transform="translate(930 315)">
    <circle r="180" fill="none" stroke="url(#l9osChassis)" stroke-width="1.6"/>
    <circle r="158" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="2 5"/>
    <circle r="70"  fill="url(#l9osHubGlow)"/>

    <!-- Active verb frozen at the "Coordinate" beat -->
    <text x="0" y="-110" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif"
          font-weight="900" font-size="14" letter-spacing="6.3" fill="rgba(255,255,255,0.32)">
      ALIGNMENT CYCLE
    </text>
    <text x="0" y="14" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif"
          font-weight="900" font-size="38" letter-spacing="-1.14" fill="#10b981">
      Coordinate.
    </text>

    <!-- 4 pressure-point dots: top, right (active), bottom, left -->
    <!-- Top: Decide (violet) -->
    <circle cx="0" cy="-180" r="26" fill="#8b5cf6" opacity="0.18"/>
    <circle cx="0" cy="-180" r="11" fill="#0d0d18" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="0" cy="-180" r="4"  fill="#8b5cf6"/>

    <!-- Right: Coordinate (emerald) — ACTIVE -->
    <circle cx="180" cy="0" r="40" fill="#10b981" opacity="0.55"/>
    <circle cx="180" cy="0" r="11" fill="#0d0d18" stroke="#10b981" stroke-width="2.4"/>
    <circle cx="180" cy="0" r="5"  fill="#10b981"/>

    <!-- Bottom: Execute (amber) -->
    <circle cx="0" cy="180" r="26" fill="#f59e0b" opacity="0.18"/>
    <circle cx="0" cy="180" r="11" fill="#0d0d18" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="0" cy="180" r="4"  fill="#f59e0b"/>

    <!-- Left: Measure (cyan) -->
    <circle cx="-180" cy="0" r="26" fill="#06b6d4" opacity="0.18"/>
    <circle cx="-180" cy="0" r="11" fill="#0d0d18" stroke="#06b6d4" stroke-width="2"/>
    <circle cx="-180" cy="0" r="4"  fill="#06b6d4"/>

    <!-- Traveling pulse mark on the chassis (frozen at NE quadrant) -->
    <circle cx="127" cy="-127" r="6" fill="#a78bfa" filter="url(#l9osBlur)"/>
  </g>

  <!-- Eyebrow -->
  <text x="72" y="100"
        font-family="'SF Mono', Menlo, monospace"
        font-size="11" letter-spacing="5.5" fill="#a78bfa" opacity="0.9">
    AI FOR OPERATIONS
  </text>

  <!-- Status chip -->
  <rect x="72" y="116" width="62" height="24" rx="12" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.4)"/>
  <circle cx="84" cy="128" r="3" fill="#10b981"/>
  <text x="93" y="132" font-family="'SF Mono', Menlo, monospace" font-size="10" letter-spacing="2" fill="#10b981">LIVE</text>
  <text x="146" y="132" font-family="'SF Mono', Menlo, monospace" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.42)">
    6 PRODUCTS · 4 PRESSURE POINTS · 1 CHASSIS
  </text>

  <!-- Wordmark -->
  <text x="72" y="288"
        font-family="Inter, system-ui, sans-serif"
        font-weight="900" font-size="120" letter-spacing="-4.8" fill="url(#l9osWord)">
    Level9<tspan fill="#06b6d4">OS</tspan>
  </text>

  <!-- Copy block -->
  <text x="72" y="370"
        font-family="Inter, system-ui, sans-serif"
        font-weight="500" font-size="24" letter-spacing="-0.24" fill="rgba(255,255,255,0.78)">
    Six AI products. Four pressure points. One operating chassis.
  </text>
  <text x="72" y="412"
        font-family="Inter, system-ui, sans-serif"
        font-weight="600" font-size="22" letter-spacing="-0.22" fill="#a78bfa">
    Augments the workforce. Replaces the friction.
  </text>

  <!-- Bottom-left domain block -->
  <text x="72" y="568"
        font-family="'SF Mono', Menlo, monospace"
        font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.35)">
    UMBRELLA · LEVEL9OS
  </text>
  <text x="72" y="592"
        font-family="Inter, system-ui, sans-serif"
        font-weight="600" font-size="14" fill="rgba(255,255,255,0.58)">
    level9os.com
  </text>

  <!-- Bottom-right product chip ribbon: S C O L P M -->
  <g transform="translate(870 580)">
    <g transform="translate(0 0)">
      <rect width="28" height="28" rx="7" fill="#8b5cf61c" stroke="#8b5cf655"/>
      <text x="14" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="800" fill="#8b5cf6">S</text>
    </g>
    <g transform="translate(36 0)">
      <rect width="28" height="28" rx="7" fill="#10b9811c" stroke="#10b98155"/>
      <text x="14" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="800" fill="#10b981">C</text>
    </g>
    <g transform="translate(72 0)">
      <rect width="28" height="28" rx="7" fill="#f59e0b1c" stroke="#f59e0b55"/>
      <text x="14" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="800" fill="#f59e0b">O</text>
    </g>
    <g transform="translate(108 0)">
      <rect width="28" height="28" rx="7" fill="#06b6d41c" stroke="#06b6d455"/>
      <text x="14" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="800" fill="#06b6d4">L</text>
    </g>
    <g transform="translate(144 0)">
      <rect width="28" height="28" rx="7" fill="#64748b1c" stroke="#64748b55"/>
      <text x="14" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="800" fill="#64748b">P</text>
    </g>
    <g transform="translate(180 0)">
      <rect width="28" height="28" rx="7" fill="#ec48991c" stroke="#ec489955"/>
      <text x="14" y="20" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="12" font-weight="800" fill="#ec4899">M</text>
    </g>
  </g>
</svg>
