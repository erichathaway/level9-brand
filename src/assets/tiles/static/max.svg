<?xml version="1.0" encoding="UTF-8"?>
<!--
  MAX static tile. 1200x630.
  Visual: audio waveform + conversation bubbles. Plain-English query becoming structured data.
  Canonical color: fuchsia (#ec4899) into pink.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="MAX · Conversational Ops">
  <defs>
    <linearGradient id="maxWord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="maxGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.36"/>
      <stop offset="60%" stop-color="#ec4899" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="maxWave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#060610"/>
  <ellipse cx="900" cy="315" rx="400" ry="280" fill="url(#maxGlow)"/>

  <!-- Waveform bars (audio visualizer). Shifted up 90px per review. -->
  <g transform="translate(700 100)" fill="url(#maxWave)">
    <rect x="0"   y="32" width="6" height="16" rx="3"/>
    <rect x="12"  y="20" width="6" height="40" rx="3"/>
    <rect x="24"  y="8"  width="6" height="64" rx="3"/>
    <rect x="36"  y="24" width="6" height="32" rx="3"/>
    <rect x="48"  y="12" width="6" height="56" rx="3"/>
    <rect x="60"  y="0"  width="6" height="80" rx="3"/>
    <rect x="72"  y="18" width="6" height="44" rx="3"/>
    <rect x="84"  y="6"  width="6" height="68" rx="3"/>
    <rect x="96"  y="22" width="6" height="36" rx="3"/>
    <rect x="108" y="28" width="6" height="24" rx="3"/>
    <rect x="120" y="14" width="6" height="52" rx="3"/>
    <rect x="132" y="4"  width="6" height="72" rx="3"/>
    <rect x="144" y="26" width="6" height="28" rx="3"/>
    <rect x="156" y="16" width="6" height="48" rx="3"/>
    <rect x="168" y="10" width="6" height="60" rx="3"/>
    <rect x="180" y="30" width="6" height="20" rx="3"/>
    <rect x="192" y="22" width="6" height="36" rx="3"/>
    <rect x="204" y="2"  width="6" height="76" rx="3"/>
    <rect x="216" y="18" width="6" height="44" rx="3"/>
    <rect x="228" y="24" width="6" height="32" rx="3"/>
    <rect x="240" y="30" width="6" height="20" rx="3"/>
    <rect x="252" y="14" width="6" height="52" rx="3"/>
    <rect x="264" y="6"  width="6" height="68" rx="3"/>
    <rect x="276" y="20" width="6" height="40" rx="3"/>
    <rect x="288" y="28" width="6" height="24" rx="3"/>
    <rect x="300" y="16" width="6" height="48" rx="3"/>
    <rect x="312" y="8"  width="6" height="64" rx="3"/>
    <rect x="324" y="26" width="6" height="28" rx="3"/>
    <rect x="336" y="18" width="6" height="44" rx="3"/>
    <rect x="348" y="32" width="6" height="16" rx="3"/>
  </g>

  <!-- Question bubble (plain English in) -->
  <g transform="translate(720 230)">
    <rect x="0" y="0" width="330" height="44" rx="22" fill="rgba(236,72,153,0.12)" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
    <text x="22" y="28" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" fill="rgba(255,255,255,0.85)">"Which pods are burning budget this week?"</text>
  </g>

  <!-- Arrow into structured response -->
  <g transform="translate(700 300)" stroke="rgba(236,72,153,0.5)" stroke-width="1.2" fill="none">
    <line x1="40" y1="0" x2="40" y2="24"/>
    <polygon points="40,24 35,14 45,14" fill="rgba(236,72,153,0.5)"/>
  </g>

  <!-- Structured response panel (visualized only; no invented metrics) -->
  <g transform="translate(720 330)" font-family="SF Mono, Menlo, monospace">
    <rect x="0" y="0" width="420" height="98" rx="10" fill="#0d0d18" stroke="rgba(236,72,153,0.4)" stroke-width="1"/>
    <text x="14" y="20" font-size="9"  fill="rgba(236,72,153,0.75)" letter-spacing="2">STRUCTURED · POD STATUS</text>
    <g font-size="12" fill="rgba(255,255,255,0.78)">
      <text x="14" y="46">pod</text>
      <text x="180" y="46">state</text>
    </g>
    <g font-size="11" fill="rgba(255,255,255,0.6)">
      <text x="14" y="68">LinkupOS</text>
      <rect x="180" y="60" width="140" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
      <rect x="180" y="60" width="96"  height="6" rx="3" fill="#ec4899"/>
      <circle cx="335" cy="63" r="3" fill="#10b981"/>
      <text x="14" y="86">ABM Engine</text>
      <rect x="180" y="78" width="140" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
      <rect x="180" y="78" width="58"  height="6" rx="3" fill="#ec4899"/>
      <circle cx="335" cy="81" r="3" fill="#10b981"/>
    </g>
  </g>

  <!-- Level9 co-sign -->
  <g transform="translate(1050 560)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#0d0d18" stroke="#ec4899" stroke-width="1" opacity="0.8"/>
    <text x="20" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="22" fill="#ffffff" transform="rotate(-14 20 26)" style="letter-spacing:-0.04em">9</text>
    <text x="52" y="25" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13" fill="rgba(255,255,255,0.65)">Level9 OS</text>
    <text x="52" y="40" font-family="SF Mono, Menlo, monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">INTERFACE LAYER</text>
  </g>

  <!-- Eyebrow + status chip -->
  <text x="72" y="96" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#f9a8d4" letter-spacing="5.5">CONVERSATIONAL OPS</text>
  <g transform="translate(72 108)">
    <rect x="0" y="0" width="122" height="22" rx="11" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <circle cx="12" cy="11" r="3" fill="#f59e0b"/>
    <text x="22" y="15" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#f59e0b" letter-spacing="1.6">IN PRODUCTION</text>
    <text x="138" y="16" font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="3">PLAIN ENGLISH · STRUCTURED OUTPUT</text>
  </g>

  <!-- Product name -->
  <text x="72" y="282" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="152" fill="url(#maxWord)" letter-spacing="-6">MAX</text>

  <text x="72" y="352" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.75)">You have data but you can't ask it questions.</text>

  <text x="72" y="412" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#f9a8d4">Talk to your operation in plain English.</text>
  <text x="72" y="440" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#f9a8d4">Every metric, every pod, every decision.</text>
  <text x="72" y="468" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#f9a8d4">One conversation away.</text>

  <g transform="translate(72 560)">
    <text font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="3">INTERFACE · THE VOICE</text>
    <text y="22" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="rgba(255,255,255,0.55)">level9os.com/products</text>
  </g>
</svg>
