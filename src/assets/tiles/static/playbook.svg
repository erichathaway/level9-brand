<?xml version="1.0" encoding="UTF-8"?>
<!--
  COO Playbook static tile. 1200x630.
  Visual: stacked horizontal timeline bars at Day 30 / Day 90 / Day 180 milestones.
  Canonical color: slate (#64748b) into zinc.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="COO Playbook · Install Protocol">
  <defs>
    <linearGradient id="pbWord" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="50%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <radialGradient id="pbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#64748b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pbBar30" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="pbBar90" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="pbBar180" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#060610"/>
  <ellipse cx="900" cy="315" rx="380" ry="260" fill="url(#pbGlow)"/>

  <!-- Timeline (3 horizontal bars) right side. Widths reduced and x shifted right 120px
       to create separation from the "COO Playbook" wordmark on the left. -->
  <g transform="translate(790 170)" font-family="Inter, system-ui, sans-serif">
    <!-- Bar 1 — Day 30 -->
    <text x="0" y="16" font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2.2">DAY 30</text>
    <text x="0" y="33" font-weight="600" font-size="13" fill="rgba(255,255,255,0.8)">Diagnose · ECI baseline</text>
    <rect x="0" y="42" width="380" height="8" rx="4" fill="rgba(148,163,184,0.1)"/>
    <rect x="0" y="42" width="77" height="8" rx="4" fill="url(#pbBar30)"/>
    <circle cx="77" cy="46" r="7" fill="#060610" stroke="#94a3b8" stroke-width="2"/>

    <!-- Bar 2 — Day 90 -->
    <g transform="translate(0 80)">
      <text x="0" y="16" font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2.2">DAY 90</text>
      <text x="0" y="33" font-weight="600" font-size="13" fill="rgba(255,255,255,0.8)">Install · Lean Ops + CxfO</text>
      <rect x="0" y="42" width="380" height="8" rx="4" fill="rgba(148,163,184,0.1)"/>
      <rect x="0" y="42" width="194" height="8" rx="4" fill="url(#pbBar90)"/>
      <circle cx="194" cy="46" r="7" fill="#060610" stroke="#cbd5e1" stroke-width="2"/>
    </g>

    <!-- Bar 3 — Day 180 -->
    <g transform="translate(0 160)">
      <text x="0" y="16" font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.5)" letter-spacing="2.2">DAY 180</text>
      <text x="0" y="33" font-weight="600" font-size="13" fill="rgba(255,255,255,0.8)">Compound · Alignment Cycle</text>
      <rect x="0" y="42" width="380" height="8" rx="4" fill="rgba(148,163,184,0.1)"/>
      <rect x="0" y="42" width="380" height="8" rx="4" fill="url(#pbBar180)"/>
      <circle cx="380" cy="46" r="7" fill="#060610" stroke="#e2e8f0" stroke-width="2"/>
    </g>

    <!-- Framework badges below timeline -->
    <g transform="translate(0 260)" font-family="SF Mono, Menlo, monospace" font-size="9" fill="rgba(255,255,255,0.45)">
      <text x="0"   y="0" letter-spacing="1.8">ECI</text>
      <text x="70"  y="0" letter-spacing="1.8">CxfO</text>
      <text x="140" y="0" letter-spacing="1.8">LEAN OPS</text>
      <text x="235" y="0" letter-spacing="1.8">ALIGNMENT</text>
    </g>
  </g>

  <!-- Level9 co-sign -->
  <g transform="translate(1050 560)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#0d0d18" stroke="#64748b" stroke-width="1" opacity="0.8"/>
    <text x="20" y="28" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="22" fill="#ffffff" transform="rotate(-14 20 26)" style="letter-spacing:-0.04em">9</text>
    <text x="52" y="25" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="13" fill="rgba(255,255,255,0.65)">Level9 OS</text>
    <text x="52" y="40" font-family="SF Mono, Menlo, monospace" font-size="9" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">METHODOLOGY LAYER</text>
  </g>

  <!-- Eyebrow + status chip -->
  <text x="72" y="96" font-family="SF Mono, Menlo, monospace" font-size="11" fill="#cbd5e1" letter-spacing="5.5">INSTALL PROTOCOL</text>
  <g transform="translate(72 108)">
    <rect x="0" y="0" width="62" height="22" rx="11" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.4)" stroke-width="1"/>
    <circle cx="12" cy="11" r="3" fill="#10b981"/>
    <text x="22" y="15" font-family="SF Mono, Menlo, monospace" font-size="10" fill="#10b981" letter-spacing="1.6">LIVE</text>
    <text x="80" y="16" font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="3">30 · 90 · 180</text>
  </g>

  <!-- Product name -->
  <text x="72" y="278" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="104" fill="url(#pbWord)" letter-spacing="-4">COO Playbook</text>

  <text x="72" y="352" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.75)">Operations is the function nobody knows</text>
  <text x="72" y="384" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="24" fill="rgba(255,255,255,0.75)">how to fix.</text>

  <text x="72" y="440" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#cbd5e1">Three decades of operational pattern recognition,</text>
  <text x="72" y="468" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="22" fill="#cbd5e1">productized into a 30/90/180 install protocol.</text>

  <g transform="translate(72 560)">
    <text font-family="SF Mono, Menlo, monospace" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="3">METHODOLOGY · THE MANUAL</text>
    <text y="22" font-family="Inter, system-ui, sans-serif" font-weight="600" font-size="14" fill="rgba(255,255,255,0.55)">thenewcoo.com</text>
  </g>
</svg>
