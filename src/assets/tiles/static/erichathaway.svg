<?xml version="1.0" encoding="UTF-8"?>
<!--
  Eric Hathaway personal-brand static tile. 1200x630 (LinkedIn Experience + post + OG share).
  Visual: 3D perspective-projected wireframe cube with 7 visible vertices, 12 edges
  (3 hidden as dashed). Approximates the canonical ForgeCube on the /architect page.
  Front-right face highlighted amber. "9" mark on the front face.
  Canonical color band: violet -> amber.

  Note: animated horizontal + vertical tiles use the LIVE ForgeCube
  component for true 3D rotation. This SVG is the static snapshot — used
  for OG share images on erichathaway.com.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Eric Hathaway · AI Operating Architect">
  <defs>
    <linearGradient id="ehName" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="ehEdgeFront" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="ehEdgeTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="ehCubeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ehBgGlow" cx="78%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0.30"/>
      <stop offset="50%"  stop-color="#f59e0b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060610"/>
  <ellipse cx="930" cy="220" rx="520" ry="380" fill="url(#ehBgGlow)"/>

  <!-- Hero: 3D perspective wireframe cube at (930, 320).
       8 vertices computed from a cube of half-side 110 rotated ~25 deg on Y
       and ~-12 deg on X, perspective projected. Coordinates relative to
       the translation origin. -->
  <g transform="translate(930 320)">
    <ellipse cx="0" cy="0" rx="280" ry="220" fill="url(#ehCubeGlow)"/>
    <ellipse cx="0" cy="170" rx="160" ry="22" fill="#a78bfa" opacity="0.20"/>

    <!-- Cube faces (drawn back-to-front for proper occlusion) -->

    <!-- Back face (faint, mostly hidden behind cube) -->
    <polygon points="-130,-118 75,-145 75,55 -130,28"
             fill="#0d0d18" fill-opacity="0.4"
             stroke="rgba(167,139,250,0.30)" stroke-width="1.2" stroke-dasharray="4 5"/>

    <!-- Top face: TBL -> TBR -> TFR -> TFL -->
    <polygon points="-130,-118 75,-145 145,-58 -45,-30"
             fill="#8b5cf6" fill-opacity="0.14"
             stroke="url(#ehEdgeTop)" stroke-width="1.8"/>

    <!-- Right face: TBR -> BBR -> BFR -> TFR -->
    <polygon points="75,-145 75,55 145,142 145,-58"
             fill="#a78bfa" fill-opacity="0.08"
             stroke="url(#ehEdgeFront)" stroke-width="1.8"/>

    <!-- Front face: TFL -> TFR -> BFR -> BFL — HIGHLIGHTED amber -->
    <polygon points="-45,-30 145,-58 145,142 -45,170"
             fill="#f59e0b" fill-opacity="0.22"
             stroke="url(#ehEdgeFront)" stroke-width="2.2"/>

    <!-- Hidden edges (back-left + bottom-back) as dashed -->
    <line x1="-130" y1="-118" x2="-130" y2="28"  stroke="rgba(167,139,250,0.40)" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="-130" y1="28"   x2="-45"  y2="170" stroke="rgba(167,139,250,0.40)" stroke-width="1" stroke-dasharray="3 4"/>
    <line x1="-130" y1="28"   x2="75"   y2="55"  stroke="rgba(167,139,250,0.40)" stroke-width="1" stroke-dasharray="3 4"/>

    <!-- Vertex dots: 7 visible -->
    <circle cx="-130" cy="-118" r="4" fill="#a78bfa"/>
    <circle cx="75"   cy="-145" r="4" fill="#a78bfa"/>
    <circle cx="145"  cy="-58"  r="4" fill="#a78bfa"/>
    <circle cx="-45"  cy="-30"  r="4" fill="#a78bfa"/>
    <circle cx="-45"  cy="170"  r="4" fill="#f59e0b"/>
    <circle cx="145"  cy="142"  r="4" fill="#f59e0b"/>
    <circle cx="75"   cy="55"   r="3" fill="rgba(167,139,250,0.50)"/>
    <circle cx="-130" cy="28"   r="3" fill="rgba(167,139,250,0.40)"/>

    <!-- "9" mark inset on the highlighted front face -->
    <text x="50" y="82" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif"
          font-weight="900" font-size="84" letter-spacing="-3.36" fill="rgba(255,255,255,0.95)">
      9
    </text>

    <!-- Active product label below cube (frozen at OutboundOS / amber beat) -->
    <text x="0" y="240" text-anchor="middle"
          font-family="'SF Mono', Menlo, monospace"
          font-weight="700" font-size="15" letter-spacing="4.8" fill="#f59e0b">
      OUTBOUNDOS
    </text>
  </g>

  <!-- Eyebrow -->
  <text x="72" y="100"
        font-family="'SF Mono', Menlo, monospace"
        font-size="11" letter-spacing="5.5" fill="#a78bfa" opacity="0.9">
    AI OPERATING ARCHITECT
  </text>

  <!-- Status chip -->
  <rect x="72" y="116" width="200" height="24" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.4)"/>
  <circle cx="84" cy="128" r="3" fill="#f59e0b"/>
  <text x="93" y="132" font-family="'SF Mono', Menlo, monospace" font-size="10" letter-spacing="2" fill="#f59e0b">OPEN TO EXEC AI ROLES</text>
  <text x="284" y="132" font-family="'SF Mono', Menlo, monospace" font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.42)">
    OPERATOR · ARCHITECT
  </text>

  <!-- Name + title -->
  <text x="72" y="234"
        font-family="Inter, system-ui, sans-serif"
        font-weight="900" font-size="76" letter-spacing="-3.04" fill="url(#ehName)">
    Eric Hathaway.
  </text>
  <text x="72" y="290"
        font-family="Inter, system-ui, sans-serif"
        font-weight="600" font-size="26" letter-spacing="-0.26" fill="rgba(255,255,255,0.65)">
    Chief AI Officer @ Level9 OS.
  </text>

  <!-- Copy block -->
  <text x="72" y="386"
        font-family="Inter, system-ui, sans-serif"
        font-weight="500" font-size="22" letter-spacing="-0.22" fill="rgba(255,255,255,0.78)">
    The architect behind the cube. Six AI products in production.
  </text>
  <text x="72" y="424"
        font-family="Inter, system-ui, sans-serif"
        font-weight="600" font-size="20" letter-spacing="-0.20" fill="#a78bfa">
    20+ years operating. 60+ countries. Now installing AI into the operating chassis.
  </text>

  <!-- Bottom-left: domain block + numbers strip stacked left -->
  <text x="72" y="540"
        font-family="'SF Mono', Menlo, monospace"
        font-size="10" letter-spacing="3" fill="rgba(255,255,255,0.35)">
    PERSONAL BRAND · ERICHATHAWAY.COM
  </text>

  <!-- Numbers strip: 4 cards -->
  <g transform="translate(72 560)">
    <g transform="translate(0 0)">
      <rect width="78" height="44" rx="8" fill="#a78bfa10" stroke="#a78bfa45"/>
      <text x="39" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="22" letter-spacing="-0.66" fill="#a78bfa">20+</text>
      <text x="39" y="36" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="8" letter-spacing="1.76" fill="#a78bfacc">YEARS</text>
    </g>
    <g transform="translate(88 0)">
      <rect width="78" height="44" rx="8" fill="#10b98110" stroke="#10b98145"/>
      <text x="39" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="22" letter-spacing="-0.66" fill="#10b981">6+</text>
      <text x="39" y="36" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="8" letter-spacing="1.76" fill="#10b981cc">PRODUCTS</text>
    </g>
    <g transform="translate(176 0)">
      <rect width="78" height="44" rx="8" fill="#06b6d410" stroke="#06b6d445"/>
      <text x="39" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="22" letter-spacing="-0.66" fill="#06b6d4">94</text>
      <text x="39" y="36" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="8" letter-spacing="1.76" fill="#06b6d4cc">OFFICES</text>
    </g>
    <g transform="translate(264 0)">
      <rect width="78" height="44" rx="8" fill="#f59e0b10" stroke="#f59e0b45"/>
      <text x="39" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="22" letter-spacing="-0.66" fill="#f59e0b">48</text>
      <text x="39" y="36" text-anchor="middle" font-family="'SF Mono', Menlo, monospace" font-size="8" letter-spacing="1.76" fill="#f59e0bcc">OFFICERS</text>
    </g>
  </g>
</svg>
